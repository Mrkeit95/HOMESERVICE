<div class="modal-bg" id="topupModal">
  <div class="modal">
    <div class="modal-close" data-close="topup">✕</div>
    <h2>Top up your wallet</h2>
    <p>Add balance to skip checkout next time — earn bonus credits on bigger top-ups.</p>
    <div class="topup-input-wrap">
      <div class="topup-input-label">Amount in IDR</div>
      <input type="text" class="topup-input" id="topupAmount" value="Rp 2.500.000" />
      <div style="font-size: 12px; color: var(--green); margin-top: 8px;">🎁 You'll get <strong>Rp 250.000 bonus</strong> (10%)</div>
    </div>
    <div class="quick-amounts">
      <div class="quick-amount" data-amount="500000" data-amount-str="Rp 500.000">Rp 500k</div>
      <div class="quick-amount" data-amount="1000000" data-amount-str="Rp 1.000.000">Rp 1M</div>
      <div class="quick-amount active" data-amount="2500000" data-amount-str="Rp 2.500.000">Rp 2.5M</div>
      <div class="quick-amount" data-amount="5000000" data-amount-str="Rp 5.000.000">Rp 5M</div>
    </div>
    <button class="btn modal-cta">Top up Rp 2.500.000 →</button>
  </div>
</div>
